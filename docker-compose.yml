# OPNsense Anomaly Detection Agent
# docker-compose up -d
#
# Usage:
#   cp .env.example .env       # then edit with your values
#   docker-compose up -d
#
# Services:
#   agent   - Anomaly detection agent (read JSONL or built-in UDP syslog)
#   postgres- Persistent event storage (events, anomalies, baselines)
#   vllm    - Optional vLLM inference server (GPU required)
#
# Modes:
#   SYSLOG_ENABLED=false (default) - agent reads events from JSONL file
#     (written by an external syslog_listener.py on host or other service)
#   SYSLOG_ENABLED=true           - agent runs built-in UDP listener on
#     port 1514, parses syslog, writes to JSONL, feeds detection pipeline

services:
  agent:
    # Image to use - set AGENT_IMAGE in .env or via deploy.sh
    # For local dev: docker build -t opnsense-anomaly-agent:latest .
    # For deploy: deploy.sh builds and sets AGENT_IMAGE automatically
    image: ${AGENT_IMAGE:-opnsense-anomaly-agent:latest}
    container_name: anomaly-agent
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      # OPNsense API (used for status lookups, not event polling)
      - OPN_HOST=${OPN_HOST:-192.168.1.1}
      - OPN_PORT=${OPN_PORT:-6666}
      - OPN_API_KEY=${OPN_API_KEY:-}
      - OPN_API_SECRET=${OPN_API_SECRET:-}
      - OPN_VERIFY_SSL=${OPN_VERIFY_SSL:-false}
      # Discord bot
      - DISCORD_TOKEN=${DISCORD_TOKEN:-}
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID:-}
      # Apprise notifications (optional multi-platform)
      - APPRISE_URLS=${APPRISE_URLS:-}
      # Chat command HTTP server
      - CHAT_PORT=${CHAT_PORT:-8765}
      # Log rotation (50MB max, 5 rotated files, gzip compressed)
      - LOG_FILE=${LOG_FILE:-/app/agent_data/agent.log}
      - LOG_MAX_BYTES=${LOG_MAX_BYTES:-50000000}
      - LOG_BACKUP_COUNT=${LOG_BACKUP_COUNT:-5}
      # Syslog listener (built-in UDP)
      - SYSLOG_ENABLED=${SYSLOG_ENABLED:-false}
      - SYSLOG_UDP_PORT=${SYSLOG_UDP_PORT:-1514}
      # vLLM inference server (optional, for future LLM-based analysis)
      - VLLM_BASE_URL=${VLLM_BASE_URL:-}
      - VLLM_MODEL=${VLLM_MODEL:-QuantTrio/Qwen3.6-35B-A3B-AWQ}
      # PostgreSQL database
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-opnsense}
      - DB_USER=${DB_USER:-opnsense}
      - DB_PASSWORD=${DB_PASSWORD:-opnsense}
      # Reverse DNS (persistent cache via Redis)
      - REVERSE_DNS_ENABLED=${REVERSE_DNS_ENABLED:-true}
      - REVERSE_DNS_SERVER=${REVERSE_DNS_SERVER:-}
      - REVERSE_DNS_CACHE_TTL=${REVERSE_DNS_CACHE_TTL:-3600}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      # Network classification (WAN/LAN/VPN detection)
      - OWN_WAN_IPS=${OWN_WAN_IPS:-}
      - LAN_IPS=${LAN_IPS:-}
      - VPN_IPS=${VPN_IPS:-}
      - CUSTOM_INTERFACES=${CUSTOM_INTERFACES:-}
      # Detection tuning
      - PORTSCAN_WINDOW=${PORTSCAN_WINDOW:-60}
      - PORTSCAN_THRESHOLD=${PORTSCAN_THRESHOLD:-5}
      - SYN_WINDOW=${SYN_WINDOW:-60}
      - SYN_THRESHOLD=${SYN_THRESHOLD:-100}
      - AUTH_WINDOW=${AUTH_WINDOW:-60}
      - AUTH_THRESHOLD=${AUTH_THRESHOLD:-15}
      - STAT_WINDOW=${STAT_WINDOW:-60}
      - STAT_ZSCORE=${STAT_ZSCORE:-3.0}
      - STAT_DEVIATION=${STAT_DEVIATION:-0.8}
      - DEDUP_SECONDS=${DEDUP_SECONDS:-300}
      - POLL_INTERVAL=${POLL_INTERVAL:-2}
      - BATCH_SIZE=${BATCH_SIZE:-50}
      - LEARN_INTERVAL=${LEARN_INTERVAL:-300}
      # UniFi controller monitoring (optional)
      - UNIFI_ENABLED=${UNIFI_ENABLED:-false}
      - UNIFI_HOST=${UNIFI_HOST:-}
      - UNIFI_PORT=${UNIFI_PORT:-8443}
      - UNIFI_USER=${UNIFI_USER:-}
      - UNIFI_PASS=${UNIFI_PASS:-}
      - UNIFI_SITE=${UNIFI_SITE:-default}
      - UNIFI_POLL_INTERVAL=${UNIFI_POLL_INTERVAL:-60}
      # Scheduled backups (in-container via psycopg2 COPY, daily by default)
      - BACKUP_INTERVAL_SECONDS=${BACKUP_INTERVAL_SECONDS:-86400}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
      - BACKUP_DIR=${BACKUP_DIR:-/app/backups}
      # Internal IP prefixes (comma-separated, overrides defaults)
      - INTERNAL_IP_PREFIXES=${INTERNAL_IP_PREFIXES:-}
      # DB retention (days to keep data)
      - DB_RETENTION_DAYS=${DB_RETENTION_DAYS:-30}
      - DB_RETENTION_INCIDENT_DAYS=${DB_RETENTION_INCIDENT_DAYS:-30}
      # GeoLite2 / MaxMind (optional)
      - MAXMIND_ACCOUNT_ID=${MAXMIND_ACCOUNT_ID:-}
      - MAXMIND_LICENSE_KEY=${MAXMIND_LICENSE_KEY:-}
      # GeoLite2 database path (inside container)
      - GEO_DB_PATH=${GEO_DB_PATH:-/app/data/GeoLite2-Country.mmdb}
    volumes:
      # Web UI (mounted so changes take effect without rebuild)
      - ./app.html:/app/app.html:ro
      # Persist learned patterns, GeoLite2 DB, and event files across restarts
      - ./agent_data:/app/agent_data
      # GeoLite2 database (mounted when available)
      - ./data:/app/data
      # Backup files (pg_dump backups stored here by host cron)
      - ./backups:/app/backups
    ports:
      # Syslog UDP listener (built-in UDP when SYSLOG_ENABLED=true)
      - "${SYSLOG_UDP_PORT:-1514}:1514/udp"
      # Chat command HTTP endpoint
      - "${CHAT_PORT:-8765}:8765/tcp"
      # Dashboard API server
      - "8766:8766/tcp"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "7"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8766/api/health | python3 -c 'import sys,json; d=json.load(sys.stdin); sys.exit(0 if d.get(\"status\") in (\"healthy\",\"active\",\"cold-start\") else 1)' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        order: stop-first

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: anomaly-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME:-opnsense}
      - POSTGRES_USER=${DB_USER:-opnsense}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-opnsense}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432/tcp"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: anomaly-redis
    restart: unless-stopped
    command: redis-server --maxmemory 50mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

