name: E2E Tests

on:
  push:
    branches: [ master, main ]
    paths:
      - 'server.py'
      - 'webui/**'
      - 'Dockerfile'
      - 'tests/**'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'server.py'
      - 'webui/**'
      - 'Dockerfile'
      - 'tests/**'
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install playwright psycopg2-binary
          npx playwright install chromium

      - name: Build test Docker image
        run: |
          cd tests
          docker compose -f docker-compose.test.yml build test-agent

      - name: Run E2E tests
        run: |
          cd tests
          python3 test_e2e_pipeline.py
        env:
          DEMO_MODE: "true"
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          OPN_API_KEY: ${{ secrets.OPN_API_KEY }}
          OPN_API_SECRET: ${{ secrets.OPN_API_SECRET }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            tests/screenshots/
            tests/test-report.json
