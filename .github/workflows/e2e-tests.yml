name: E2E Tests

on:
  push:
    branches: [ master, main ]
    paths:
      - 'server.py'
      - 'webui/**'
      - 'Dockerfile'
      - 'tests/**'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'server.py'
      - 'webui/**'
      - 'Dockerfile'
      - 'tests/**'
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests (adaptive_parser)
        run: |
          python -m pytest tests/test_adaptive_parser.py -v --tb=short

      - name: Run unit tests (reverse_dns)
        run: |
          python -m pytest tests/test_reverse_dns.py -v --tb=short

      - name: Run unit tests (ml_learning)
        run: |
          python -m pytest tests/test_ml_learning.py -v --tb=short

      - name: Run unit tests (rule_classify)
        run: |
          python -m pytest tests/test_rule_classify.py -v --tb=short

      - name: Run unit tests (statistical_model)
        run: |
          python -m pytest tests/test_statistical_model.py -v --tb=short

      - name: Run integration tests (full pipeline + embeds)
        run: |
          python -m pytest tests/test_integration.py -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            tests/screenshots/
            tests/test-report.json