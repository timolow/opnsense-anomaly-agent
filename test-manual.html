<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test SPA</title>
    <script>
        window.addEventListener('error', function(e) {
            console.error('Global error:', e.message, 'at', e.filename + ':' + e.lineno);
            var root = document.getElementById('root');
            if (root) root.innerHTML = '<h1 style="color:red">JS Error: ' + e.message + '</h1><p>File: ' + e.filename + ' Line: ' + e.lineno + '</p><pre>' + String(e.error || '') + '</pre>';
        });
        window.addEventListener('unhandledrejection', function(e) {
            console.error('Unhandled rejection:', e.reason);
            var root = document.getElementById('root');
            if (root) root.innerHTML = '<h1 style="color:red">Promise Rejection: ' + String(e.reason) + '</h1>';
        });
    </script>
</head>
<body>
    <div id="root">Loading...</div>
    <script type="module" src="http://localhost:8766/assets/index-Du3ORamm.js"></script>
</body>
</html>
