# pfelk - Single-node deployment for OPNsense anomaly detection integration
# Deploy on: 192.168.99.12 (vLLM server, 62GB RAM)
# Purpose: Ingest OPNsense syslog, parse with Grok, store in Elasticsearch
# Kibana provides dashboards; anomaly agent reads from Elasticsearch

services:
  # ── Elasticsearch (single node for resource efficiency) ──
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION:-8.17.0}
    container_name: elasticsearch
    environment:
      - node.name=elasticsearch
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    mem_limit: 2g
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - elk
    restart: unless-stopped

  # ── Kibana ──
  kibana:
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION:-8.17.0}
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD:-changeme}
      - SERVER_PORT=5601
    mem_limit: 1g
    depends_on:
      elasticsearch:
        condition: service_started
    ports:
      - "5601:5601"
    networks:
      - elk
    restart: unless-stopped

  # ── Logstash (syslog ingestion + pfelk parsing) ──
  logstash:
    image: docker.elastic.co/logstash/logstash:${STACK_VERSION:-8.17.0}
    container_name: logstash
    environment:
      - xpack.monitoring.enabled=false
    mem_limit: 2g
    volumes:
      # Mount pfelk configuration
      - ./pfelk-config/logstash/pipeline:/usr/share/logstash/pipeline:ro,Z
      - ./pfelk-config/logstash/patterns:/etc/pfelk/patterns:ro,Z
    ports:
      - "5140:5140/tcp"
      - "5140:5140/udp"
    depends_on:
      elasticsearch:
        condition: service_started
    networks:
      - elk
    restart: unless-stopped

volumes:
  esdata:
    driver: local

networks:
  elk:
    driver: bridge
