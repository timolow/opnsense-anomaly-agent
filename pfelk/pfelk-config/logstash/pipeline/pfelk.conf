# pfelk Logstash pipeline for OPNsense syslog ingestion
# This replicates pfelk's parsing logic:
#   1. Ingest syslog from port 5140
#   2. Parse with OPNsense Grok pattern
#   3. Split filterlog CSV into structured fields
#   4. Output to Elasticsearch

input {
  # ── Firewall syslog input ──
  syslog {
    id => "pfelk-firewall"
    type => "firewall"
    port => 5140
    syslog_field => "message"
    ecs_compatibility => v1
    grok_pattern => "<%{POSINT:[log][syslog][priority]}>%{GREEDYDATA:pfelk}"
    tags => ["pfelk"]
  }
}

filter {
  # ── Grok parse with OPNsense pattern ──
  grok {
    patterns_dir => [ "/etc/pfelk/patterns" ]
    match => { "pfelk" => "%{OPNSENSE}" }
  }

  # ── Parse filterlog CSV fields ──
  if [log][syslog][appname] == "filterlog" and [filter_message] {
    mutate {
      add_tag => "filterlog"
      add_field => { "[event][dataset]" => "pfelk.firewall" }
      replace => { "[log][syslog][appname]" => "firewall" }
      copy => { "filter_message" => "pfelk_csv" }
    }
    mutate {
      strip => "pfelk_csv"
      split => { "pfelk_csv" => "," }
    }

    # ── Common fields (all IP versions) ──
    # rule.id, rule.subid, rule.anchor, rule.uuid, interface, reason, action, direction, type
    mutate {
      add_field => {
        "[rule][id]" => "%{[pfelk_csv][0]}"
        "[pf][rule][subid]" => "%{[pfelk_csv][1]}"
        "[pf][anchor]" => "%{[pfelk_csv][2]}"
        "[rule][uuid]" => "%{[pfelk_csv][3]}"
        "[interface][name]" => "%{[pfelk_csv][4]}"
        "[event][reason]" => "%{[pfelk_csv][5]}"
        "[event][action]" => "%{[pfelk_csv][6]}"
        "[network][direction]" => "%{[pfelk_csv][7]}"
        "[network][type]" => "%{[pfelk_csv][8]}"
      }
    }

    # ── IPv4 parsing ──
    if [network][type] == "4" {
      mutate {
        add_field => {
          "[pf][tos]" => "%{[pfelk_csv][9]}"
          "[pf][ecn]" => "%{[pfelk_csv][10]}"
          "[pf][ttl]" => "%{[pfelk_csv][11]}"
          "[pf][id]" => "%{[pfelk_csv][12]}"
          "[pf][offset]" => "%{[pfelk_csv][13]}"
          "[pf][flags]" => "%{[pfelk_csv][14]}"
          "[network][iana_number]" => "%{[pfelk_csv][15]}"
          "[network][protocol]" => "%{[pfelk_csv][16]}"
          "[pf][packet][length]" => "%{[pfelk_csv][17]}"
          "[source][ip]" => "%{[pfelk_csv][18]}"
          "[destination][ip]" => "%{[pfelk_csv][19]}"
        }
      }

      # TCP fields
      if [network][protocol] == "tcp" {
        mutate {
          add_field => {
            "[source][port]" => "%{[pfelk_csv][20]}"
            "[destination][port]" => "%{[pfelk_csv][21]}"
            "[pf][data_length]" => "%{[pfelk_csv][22]}"
            "[pf][tcp][flags]" => "%{[pfelk_csv][23]}"
            "[pf][tcp][sequence_number]" => "%{[pfelk_csv][24]}"
            "[pf][tcp][ack]" => "%{[pfelk_csv][25]}"
            "[pf][tcp][window]" => "%{[pfelk_csv][26]}"
            "[pf][tcp][urg]" => "%{[pfelk_csv][27]}"
            "[pf][tcp][options]" => "%{[pfelk_csv][28]}"
          }
        }
      }

      # UDP fields
      if [network][protocol] == "udp" {
        mutate {
          add_field => {
            "[source][port]" => "%{[pfelk_csv][20]}"
            "[destination][port]" => "%{[pfelk_csv][21]}"
            "[pf][data_length]" => "%{[pfelk_csv][22]}"
          }
        }
      }
    }

    # ── IPv6 parsing ──
    if [network][type] == "6" {
      mutate {
        add_field => {
          "[pf][class]" => "%{[pfelk_csv][9]}"
          "[pf][flow]" => "%{[pfelk_csv][10]}"
          "[pf][hoplimit]" => "%{[pfelk_csv][11]}"
          "[network][protocol]" => "%{[pfelk_csv][12]}"
          "[network][iana_number]" => "%{[pfelk_csv][13]}"
          "[pf][packet][length]" => "%{[pfelk_csv][14]}"
          "[source][ip]" => "%{[pfelk_csv][15]}"
          "[destination][ip]" => "%{[pfelk_csv][16]}"
        }
      }

      # IPv6 TCP fields
      if [network][protocol] == "tcp" {
        mutate {
          add_field => {
            "[source][port]" => "%{[pfelk_csv][17]}"
            "[destination][port]" => "%{[pfelk_csv][18]}"
            "[pf][data_length]" => "%{[pfelk_csv][19]}"
            "[pf][tcp][flags]" => "%{[pfelk_csv][20]}"
            "[pf][tcp][sequence_number]" => "%{[pfelk_csv][21]}"
            "[pf][tcp][ack]" => "%{[pfelk_csv][22]}"
            "[pf][tcp][window]" => "%{[pfelk_csv][23]}"
            "[pf][tcp][urg]" => "%{[pfelk_csv][24]}"
            "[pf][tcp][options]" => "%{[pfelk_csv][25]}"
          }
        }
      }

      # IPv6 UDP fields
      if [network][protocol] == "udp" {
        mutate {
          add_field => {
            "[source][port]" => "%{[pfelk_csv][17]}"
            "[destination][port]" => "%{[pfelk_csv][18]}"
            "[pf][data_length]" => "%{[pfelk_csv][19]}"
          }
        }
      }
    }

    # ── Date parsing ──
    date {
      match => [ "[event][created]", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss", "ISO8601" ]
      target => "[event][created]"
    }

    # ── GeoIP enrichment (if MaxMind available) ──
    # geoip {
    #   source => "[source][ip]"
    #   target => "[source][geo]"
    #   database => "/etc/pfelk/databases/GeoLite2-City.mmdb"
    # }
    # geoip {
    #   source => "[destination][ip]"
    #   target => "[destination][geo]"
    #   database => "/etc/pfelk/databases/GeoLite2-City.mmdb"
    # }
  }

  # ── Namespace assignment for data streams ──
  if [log][syslog][appname] == "firewall" {
    mutate { add_field => { "[data_stream][namespace]" => "firewall" } }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    # Use index-based storage (simpler than data streams for single-node)
    index => "pfelk-firewall-%{+YYYY.MM.dd}"
    # User authentication
    user => "elastic"
    password => "%{[ELASTIC_PASSWORD]}"
    # SSL not needed for local single-node
    ssl => false
  }

  # Debug output (uncomment for development)
  # stdout { codec => rubydebug }
}
